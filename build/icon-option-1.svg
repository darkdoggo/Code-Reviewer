<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="mag1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg1)"/>
  <!-- Magnifier circle -->
  <circle cx="420" cy="420" r="240" fill="none" stroke="url(#mag1)" stroke-width="68"/>
  <!-- Magnifier handle -->
  <line x1="610" y1="610" x2="820" y2="820" stroke="url(#mag1)" stroke-width="90" stroke-linecap="round"/>
  <!-- Code </> inside magnifier -->
  <polyline points="360,360 280,420 360,480" fill="none" stroke="#1e293b" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="460" y1="340" x2="400" y2="500" stroke="#1e293b" stroke-width="56" stroke-linecap="round"/>
  <polyline points="480,360 560,420 480,480" fill="none" stroke="#1e293b" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
