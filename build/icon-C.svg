<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- Code lines (white bars representing code) -->
  <rect x="180" y="280" width="420" height="60" rx="30" fill="white" opacity="0.9"/>
  <rect x="180" y="390" width="320" height="60" rx="30" fill="white" opacity="0.7"/>
  <rect x="180" y="500" width="380" height="60" rx="30" fill="white" opacity="0.9"/>
  <rect x="180" y="610" width="260" height="60" rx="30" fill="white" opacity="0.7"/>
  <rect x="180" y="720" width="340" height="60" rx="30" fill="white" opacity="0.5"/>
  <!-- Check badge circle -->
  <circle cx="720" cy="720" r="200" fill="#22c55e"/>
  <!-- Check mark -->
  <polyline points="620,720 700,800 840,640" fill="none" stroke="white" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
