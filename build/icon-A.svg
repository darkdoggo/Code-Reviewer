<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <!-- Magnifier circle - larger, centered slightly up-left -->
  <circle cx="420" cy="420" r="230" fill="none" stroke="white" stroke-width="80"/>
  <!-- Magnifier handle -->
  <line x1="600" y1="600" x2="800" y2="800" stroke="white" stroke-width="90" stroke-linecap="round"/>
  <!-- < bracket -->
  <polyline points="320,340 200,420 320,500" fill="none" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / slash -->
  <line x1="460" y1="310" x2="380" y2="530" stroke="white" stroke-width="72" stroke-linecap="round"/>
  <!-- > bracket -->
  <polyline points="520,340 640,420 520,500" fill="none" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
